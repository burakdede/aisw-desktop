name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - ubuntu-22.04
          - windows-latest
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Download aisw sidecar
        shell: bash
        run: |
          set -euo pipefail
          target="$(rustc --print host-tuple)"
          case "$target" in
            aarch64-apple-darwin)
              asset="aisw-aarch64-apple-darwin"
              ;;
            x86_64-apple-darwin)
              asset="aisw-x86_64-apple-darwin"
              ;;
            x86_64-unknown-linux-gnu)
              asset="aisw-x86_64-unknown-linux-gnu"
              ;;
            x86_64-pc-windows-msvc)
              asset="aisw-x86_64-pc-windows-msvc.exe"
              ;;
            *)
              echo "Unsupported rust host tuple: $target" >&2
              exit 1
              ;;
          esac

          mkdir -p "$RUNNER_TEMP/aisw-sidecar"
          curl -fsSL "https://github.com/burakdede/aisw/releases/download/v0.3.8/$asset" -o "$RUNNER_TEMP/aisw-sidecar/$asset"
          echo "AISW_TARGET_TRIPLE=$target" >> "$GITHUB_ENV"
          echo "AISW_SIDECAR_PATH=$RUNNER_TEMP/aisw-sidecar/$asset" >> "$GITHUB_ENV"

      - name: Stage aisw sidecar
        shell: bash
        run: npm run prepare:sidecar -- --target "$AISW_TARGET_TRIPLE" "$AISW_SIDECAR_PATH"

      - name: Verify frontend
        run: |
          npm test
          npm run test:coverage
          npm run test:e2e
          npm run build
          npm run verify:release

      - name: Verify Rust
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --check
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path src-tauri/Cargo.toml
          cargo check --manifest-path src-tauri/Cargo.toml
